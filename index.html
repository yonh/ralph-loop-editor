<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ralph Loop Editor</title>
  <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      gap: 16px;
    }
    h1 {
      color: white;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      margin: 0 0 20px 0;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 1200px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      min-height: 85vh;
      max-height: 95vh;
      display: flex;
      flex-direction: column;
    }
    
    @media (max-width: 768px) {
      .container {
        min-height: 90vh;
        max-height: 98vh;
        padding: 16px;
      }
      h1 {
        font-size: 2rem;
      }
    }
    .status {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 20px;
      padding: 12px;
      border-radius: 8px;
      background: #f5f5f5;
    }
    .status.disabled { background: #ffebee; color: #c62828; }
    .status.enabled { background: #e8f5e9; color: #2e7d32; }
    .status.running { background: #e3f2fd; color: #1565c0; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
      font-size: 0.9rem;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    input[type="text"]:disabled, textarea:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .hint { font-size: 0.8rem; color: #666; margin-top: 4px; }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    button {
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      color: white;
    }
    button:hover:not(:disabled) { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #toggle-btn { background: #4caf50; }
    #start-btn { background: #2196f3; }
    #stop-btn { background: #f44336; }
    .divider { height: 1px; background: #e0e0e0; margin: 20px 0; }
    .debug-panel {
      margin-top: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      overflow: hidden;
    }
    .debug-title {
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #333;
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
    }
    #debug-log {
      margin: 0;
      padding: 12px;
      max-height: 240px;
      overflow: auto;
      font-size: 0.78rem;
      line-height: 1.45;
      color: #1f2937;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .terminal-panel {
      margin-top: 0;
      border: none;
      border-radius: 0;
      overflow: hidden;
      background: #ffffff;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .terminal-title {
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #263238;
      background: #eceff1;
      border-bottom: 1px solid #cfd8dc;
    }
    #terminal-output {
      margin: 0;
      padding: 0;
      flex: 1;
      overflow: hidden;
      background: #0f172a;
      min-height: 0;
    }
    .terminal-input-row {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #cfd8dc;
      background: #f8fafc;
    }
    #terminal-input {
      flex: 1;
    }
    #send-btn {
      background: #0ea5e9;
      min-width: 88px;
    }
    .logs-tabs {
      margin-top: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .tabs-header {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      background: #f8fafc;
    }
    .tab-btn {
      flex: 1;
      border: none;
      border-right: 1px solid #e0e0e0;
      background: transparent;
      color: #475569;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 0;
    }
    .tab-btn:last-child {
      border-right: none;
    }
    .tab-btn.active {
      background: #ffffff;
      color: #0f172a;
    }
    .tab-panel {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .tab-panel[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Ralph Loop Editor</h1>
  <div class="container">
    <div class="status disabled" id="status">Status: Disabled</div>

    <div class="form-group">
      <label for="work-dir">Working Directory</label>
      <input type="text" id="work-dir" placeholder="Leave empty to use current directory">
      <div class="hint">Ralph Loop will execute in this directory.</div>
    </div>

    <div class="form-group">
      <label for="prompt">Task Prompt</label>
      <textarea id="prompt" placeholder="Leave empty to use the default prompt."></textarea>
      <div class="hint">Describe what you want Ralph Loop to do.</div>
    </div>

    <div class="divider"></div>

    <div class="controls">
      <button id="toggle-btn">Enable</button>
      <button id="start-btn" disabled>Start</button>
      <button id="stop-btn" disabled>Stop</button>
    </div>

    <div class="logs-tabs">
      <div class="tabs-header">
        <button class="tab-btn active" id="tab-terminal" data-tab="terminal">Loop Terminal</button>
        <button class="tab-btn" id="tab-debug" data-tab="debug">Debug Logs</button>
      </div>

      <section class="tab-panel" id="panel-terminal">
        <div class="terminal-panel" style="margin-top: 0; border: none; border-radius: 0;">
          <div id="terminal-output"></div>
          <div class="terminal-input-row">
            <input type="text" id="terminal-input" placeholder="Type command/input and press Enter">
            <button id="send-btn" disabled>Send</button>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="panel-debug" hidden>
        <div class="debug-panel" style="margin-top: 0; border: none; border-radius: 0;">
          <pre id="debug-log"></pre>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ralph Loop Editor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      gap: 16px;
    }
    h1 {
      color: white;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      margin: 0 0 20px 0;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .status {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 20px;
      padding: 12px;
      border-radius: 8px;
      background: #f5f5f5;
    }
    .status.disabled { background: #ffebee; color: #c62828; }
    .status.enabled { background: #e8f5e9; color: #2e7d32; }
    .status.running { background: #e3f2fd; color: #1565c0; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
      font-size: 0.9rem;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    input[type="text"]:disabled, textarea:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .hint { font-size: 0.8rem; color: #666; margin-top: 4px; }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    button {
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #toggle-btn { background: #4caf50; color: white; }
    #start-btn { background: #2196f3; color: white; }
    #stop-btn { background: #f44336; color: white; }
    .divider { height: 1px; background: #e0e0e0; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>Ralph Loop Editor</h1>
  <div class="container">
    <div class="status disabled" id="status">状态: 未启用</div>

    <div class="form-group">
      <label for="work-dir">工作目录</label>
      <input type="text" id="work-dir" placeholder="留空使用当前目录">
      <div class="hint">Ralph Loop 将在此目录下执行任务</div>
    </div>

    <div class="form-group">
      <label for="prompt">任务提示词</label>
      <textarea id="prompt" placeholder="留空使用默认提示词：创建一个优秀的团队来实践工作，阅读 任务目标.md 实现工作..."></textarea>
      <div class="hint">描述您希望 Ralph Loop 完成的任务</div>
    </div>

    <div class="divider"></div>

    <div class="controls">
      <button id="toggle-btn">启用</button>
      <button id="start-btn" disabled>开始</button>
      <button id="stop-btn" disabled>停止</button>
    </div>
  </div>
  <script>
    const { invoke } = window.__TAURI__.core;

    const toggleBtn = document.getElementById('toggle-btn');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusDiv = document.getElementById('status');
    const workDirInput = document.getElementById('work-dir');
    const promptInput = document.getElementById('prompt');

    let enabled = false;
    let running = false;

    function syncUI() {
      toggleBtn.textContent = enabled ? '禁用' : '启用';
      startBtn.disabled = !enabled || running;
      stopBtn.disabled = !enabled || !running;
      statusDiv.className = 'status';
      if (running) {
        statusDiv.classList.add('running');
        statusDiv.textContent = '状态: 运行中';
      } else if (enabled) {
        statusDiv.classList.add('enabled');
        statusDiv.textContent = '状态: 已启用';
      } else {
        statusDiv.classList.add('disabled');
        statusDiv.textContent = '状态: 未启用';
      }
    }

    async function init() {
      enabled = await invoke('get_enabled');
      console.log('[init] enabled:', enabled);
      syncUI();
    }

    toggleBtn.addEventListener('click', async () => {
      const newEnabled = !enabled;
      console.log('[toggle] setting enabled to:', newEnabled);
      enabled = await invoke('set_enabled', { enabled: newEnabled });
      console.log('[toggle] enabled is now:', enabled);
      syncUI();
    });

    startBtn.addEventListener('click', async () => {
      running = true;
      syncUI();
      workDirInput.disabled = true;
      promptInput.disabled = true;

      const workDir = workDirInput.value || null;
      const prompt = promptInput.value || null;

      try {
        await invoke('start_loop', { workDir, prompt });
      } catch (err) {
        console.error('启动失败:', err);
        alert('启动失败: ' + err);
        running = false;
        syncUI();
        workDirInput.disabled = false;
        promptInput.disabled = false;
      }
    });

    stopBtn.addEventListener('click', async () => {
      running = false;
      syncUI();
      workDirInput.disabled = false;
      promptInput.disabled = false;
      await invoke('stop_loop');
    });

    init();
  </script>
</body>
</html>
